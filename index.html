<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로마서 8장 암송 테스트</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header class="app-header">
    <h1>로마서 8장 암송 테스트</h1>
    <p class="subtitle">개역개정 · 직접 입력 하면서 외우기</p>
  </header>

  <!-- 설정 화면 -->
  <section id="setup-screen" class="screen">
    <h2>테스트 설정</h2>
    <div class="settings-grid">
      <div class="form-row">
        <label for="startVerse">시작 구절 <span class="hint">1~39</span></label>
        <input type="number" id="startVerse" min="1" max="39" value="1">
      </div>
      <div class="form-row">
        <label for="endVerse">끝 구절 <span class="hint">1~39</span></label>
        <input type="number" id="endVerse" min="1" max="39" value="39">
      </div>

      <div class="form-row toggle-row">
        <label for="hideEnabled">숨기기 기능</label>
        <label class="switch">
          <input type="checkbox" id="hideEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="form-row toggle-row">
        <label for="inputEnabled">텍스트 입력</label>
        <label class="switch">
          <input type="checkbox" id="inputEnabled" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="form-row">
        <label for="revealSeconds">문제 보는 시간 <span class="hint">초 (2초 대기 후 서서히 숨김)</span></label>
        <input type="number" id="revealSeconds" min="2" max="60" value="10">
      </div>

      <div class="form-row">
        <label for="level">난이도 레벨 <span class="hint">빈칸 비율</span></label>
        <select id="level">
          <option value="1" selected>Level 1 · 빈칸 10%</option>
          <option value="2">Level 2 · 빈칸 20%</option>
          <option value="3">Level 3 · 빈칸 30%</option>
          <option value="4">Level 4 · 빈칸 40%</option>
          <option value="5">Level 5 · 빈칸 50%</option>
          <option value="6">Level 6 · 빈칸 60%</option>
          <option value="7">Level 7 · 빈칸 70%</option>
          <option value="8">Level 8 · 빈칸 80%</option>
          <option value="9">Level 9 · 빈칸 90%</option>
          <option value="10">Level 10 · 빈칸 100%</option>
        </select>
      </div>

      <div class="form-row">
        <label for="continuousCount">연속 정답 횟수 <span class="hint">다음 구절 이동 기준</span></label>
        <input type="number" id="continuousCount" min="1" max="10" value="1">
      </div>
    </div>
    <button id="startBtn" class="primary big-btn">테스트 시작하기</button>
  </section>

  <!-- 테스트 화면 -->
  <section id="test-screen" class="screen hidden">
    <div class="status-bar">
      <div class="status-card">
        <div class="label">구절</div>
        <div class="value" id="verseInfo">—</div>
      </div>
      <div class="status-card">
        <div class="label">난이도</div>
        <div class="value" id="levelInfo">—</div>
      </div>
      <div class="status-card">
        <div class="label">연속 정답</div>
        <div class="value" id="streakInfo">—</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-labels">
        <span id="progressLabel">진행률</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div id="questionBox" class="question-box">
      <div id="questionText"></div>
    </div>

    <div class="input-area">
      <textarea id="answerInput" rows="4" placeholder="전체 구절을 입력하세요. Enter 키로 제출할 수 있습니다."></textarea>
      <div class="input-hint">
        <kbd>Enter</kbd> 제출 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 줄바꿈
      </div>
      <div class="button-row">
        <button id="submitBtn" class="primary">제출</button>
        <button id="hintBtn" class="secondary">💡 힌트</button>
        <button id="viewToggleBtn" class="secondary">👁 전체 보기</button>
        <button id="inputToggleBtn" class="secondary">⌨ 입력 ON</button>
        <button id="prevBtn" class="secondary">◀ Prev</button>
        <button id="nextBtn" class="secondary">Next ▶</button>
        <div class="spacer"></div>
        <button id="quitBtn" class="ghost">종료</button>
      </div>
    </div>

    <div id="feedback" class="feedback"></div>
  </section>

  <!-- 완료 화면 -->
  <section id="done-screen" class="screen hidden">
    <div class="trophy">🏆</div>
    <h2>축하합니다!</h2>
    <p id="doneMessage">로마서 8장 암송을 완료하셨습니다.</p>
    <button id="restartBtn" class="primary big-btn">처음으로</button>
  </section>
</div>

<script src="verses.js"></script>
<script src="app.js"></script>
</body>
</html>
